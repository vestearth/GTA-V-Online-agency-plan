# GTA V Online Agency — Proposed Orchestration Workflow (Conceptual Multi-Agent Framework)
# -----------------------------------------------------------------------------
# This file serves as the definitive reference for the Multi-Agent LLM Orchestrator
# (e.g., matching CrewAI, LangGraph, AutoGen, or MCP concepts).
# It links the schemas, workflows, agents, and skills.
# -----------------------------------------------------------------------------

schema:
  version: "2.0"
  mode: weekly_planning
  example_payload: data/weekly_planning_2026_w14.json

paths:
  # -> New Architecture Paths
  workflows: src/workflows              # Orchestration DAG and Sequence
  agents: src/agents                    # Agent personas, goals, instructions (YAML)
  skills: src/skills                    # Executable/conceptual tools for LLMs (YAML/Python/Markdown)
  data: data                            # Raw JSON payloads

# The new workflow execution process is strictly defined in `src/workflows/weekly_planning.yaml`.
# 1. Schema Precheck (Lester + validate_weekly_schema_lightweight)
# 2. Activity Normalization (Lester + normalize_featured_activities)
# 3. Vehicle Normalization (Lester + normalize_vehicle_opportunities)
# 4. Prerequisite Gate (Agent 14 + gate_activity_prerequisites + player_profile)
# 5. Parallel Specialist Analysis (Michael, Franklin, Trevor, Agent 14, Tony)
#    - Includes helper context from compare_week_over_week and evaluate_purchase_fit
# 6. Executive Synthesis (Lester + priority scoring + action queue)
# 7. Post-Synthesis Quality Group (route design, advisory decision memory,
#    and validate_report_completeness)
