name: GTA Weekly Planning Orchestration
version: "1.1"
description: >
  Orchestrates the entire weekly update analysis for GTA V Online,
  routing tasks through specialized agents (Michael, Franklin, Trevor, Agent 14, Tony)
  and finalizing a cohesive report via Lester.

entry_node: Schema_Precheck

nodes:
  - id: Schema_Precheck
    agent: Lester
    skill: validate_weekly_schema_lightweight
    input_state: weekly_schema_v2
    on_success: Normalize_Activities
    on_fail: END_WITH_DATA_ISSUES

  - id: Normalize_Activities
    agent: Lester
    skill: normalize_featured_activities
    input_state: weekly_schema_v2
    output_state: normalized_weekly_schema_v2
    next: Normalize_Vehicles

  - id: Normalize_Vehicles
    agent: Lester
    skill: normalize_vehicle_opportunities
    input_state: normalized_weekly_schema_v2
    output_state: fully_normalized_weekly_schema_v2
    next: Prerequisite_Gate

  - id: Prerequisite_Gate
    agent: Agent14
    skill: gate_activity_prerequisites
    input_state:
      - fully_normalized_weekly_schema_v2
      - player_profile
    output_state: readiness_gate_report
    on_success: Specialized_Analysis_Group
    on_fail: END_WITH_READINESS_ISSUES

  - id: Specialized_Analysis_Group
    type: parallel
    input_state:
      - fully_normalized_weekly_schema_v2
      - player_profile
      - readiness_gate_report
    tasks:
      - task_id: Week_Over_Week_Context
        agent: Lester
        skill: compare_week_over_week
      - task_id: Financial_Analysis
        agent: Michael
        skill: calculate_business_roi
      - task_id: Loop_ROI_Analysis
        agent: Michael
        skill: calculate_activity_loop_roi
      - task_id: Vehicle_Analysis
        agent: Franklin
        skill: evaluate_vehicles
        references:
          vehicle_price_reference: data/references/vehicle_prices.yaml
      - task_id: Purchase_Fit_Analysis
        agent: Franklin
        skill: evaluate_purchase_fit
      - task_id: Combat_Analysis
        agent: Trevor
        skill: evaluate_combat_value
        references:
          weapon_stats_reference: data/references/weapon_stats.yaml
      - task_id: Operations_Logistics
        agent: Agent14
        skill: assess_operational_readiness
      - task_id: Passive_Income
        agent: Tony
        skill: analyze_nightclub_feeder
    output_state: specialized_reports
    next: Executive_Summary

  - id: Executive_Summary
    agent: Lester
    input_state: 
      - fully_normalized_weekly_schema_v2
      - player_profile
      - readiness_gate_report
      - specialized_reports
    skill: synthesize_final_report
    output_state: final_weekly_plan
    next: Post_Synthesis_Quality_Group

  - id: Post_Synthesis_Quality_Group
    type: parallel
    input_state:
      - fully_normalized_weekly_schema_v2
      - player_profile
      - readiness_gate_report
      - specialized_reports
      - final_weekly_plan
      # week_id is derived by skills from fully_normalized_weekly_schema_v2.week.id when not
      # explicitly present. Pass it here for skills that accept it as an optional field.
      - week_id: fully_normalized_weekly_schema_v2.week.id
    tasks:
      - task_id: Weekly_Route_Design
        agent: Agent14
        skill: design_weekly_route
      - task_id: Decision_Memory_Update
        agent: Lester
        skill: track_weekly_decisions
      - task_id: Report_Completeness_QA
        agent: Lester
        skill: validate_report_completeness
    output_state: post_synthesis_reports
    next: END

  - id: END_WITH_READINESS_ISSUES
    type: terminal
    output_state: readiness_gate_report

  - id: END_WITH_DATA_ISSUES
    type: terminal
    output_state: validation_errors
