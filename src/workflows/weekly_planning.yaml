name: GTA Weekly Planning Orchestration
version: "1.0"
description: >
  Orchestrates the entire weekly update analysis for GTA V Online,
  routing tasks through specialized agents (Michael, Franklin, Agent 14, Tony)
  and finalizing a cohesive report via Lester.

entry_node: Schema_Precheck

nodes:
  - id: Schema_Precheck
    agent: Lester
    skill: validate_weekly_schema_lightweight
    input_state: weekly_schema_v2
    on_success: Specialized_Analysis_Group
    on_fail: END_WITH_DATA_ISSUES

  - id: Specialized_Analysis_Group
    type: parallel
    input_state: weekly_schema_v2
    tasks:
      - task_id: Financial_Analysis
        agent: Michael
        skill: calculate_business_roi
      - task_id: Vehicle_Analysis
        agent: Franklin
        skill: evaluate_vehicles
      - task_id: Operations_Logistics
        agent: Agent14
        skill: assess_operational_readiness
      - task_id: Passive_Income
        agent: Tony
        skill: analyze_nightclub_feeder
    output_state: specialized_reports
    next: Executive_Summary

  - id: Executive_Summary
    agent: Lester
    input_state: 
      - weekly_schema_v2
      - specialized_reports
    skill: synthesize_final_report
    output_state: final_weekly_plan
    next: END

  - id: END_WITH_DATA_ISSUES
    type: terminal
    output_state: validation_errors
