name: evaluate_vehicles
description: >
  Analyze a vehicle opportunity (Prize Ride, Test Ride, Podium, Discount)
  using schema v2 fields with backward-compatible aliases.
input_schema:
  type: object
  properties:
    vehicle_name:
      type: string
    price:
      type: number
    discount_percent:
      type: number
    opportunity_type:
      type: string
    acquisition:
      type: object
      description: Source details such as challenge or claim path
    player_inventory:
      type: array
      items:
        type: string
        description: List of vehicles the player already owns
  required: [vehicle_name]
field_aliases:
  base_price: price
  discount_percentage: discount_percent
  acquisition_method: opportunity_type

execution_logic: |
  1. Normalize aliases first (`base_price` -> `price`, `discount_percentage` -> `discount_percent`).
  2. If `price` is null, keep recommendation qualitative and mark purchase ROI as `Unknown Price`.
  3. Determine `final_price` = `price` * (100 - `discount_percent`) / 100 when both are present.
  4. Check if the vehicle is in `player_inventory`. If yes, output: "Skip - Already Owned."
  5. If `opportunity_type` is "prize_ride" or "podium", evaluate challenge effort or claim odds.
  6. Compare performance and utility tags against player's goals and owned assets.
  7. Recommend 'Prioritize' if discount is strong and utility is high, 'Consider' for niche/collector value, 'Skip' otherwise.
