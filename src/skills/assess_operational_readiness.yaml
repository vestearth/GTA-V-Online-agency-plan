# GTA V Online Agency - Agent 14 Report
name: assess_operational_readiness
description: >
  Evaluates activities against player's asset ownership, constraints, and session size
input_schema:
  type: object
  properties:
    featured_activities:
      type: array
    owned_assets:
      type: object
    constraints:
      type: object
    planning_context:
      type: object
execution_logic: |
  1. For each featured activity, check if `requirements` exist in `owned_assets.properties`.
  2. Map party-size fit using `recommended_party_size` against `constraints.preferred_session_size`.
  3. Use `timebox_minutes` when present; if null, flag as non-blocking uncertainty.
  4. Ensure selected plan does not exceed `constraints.hours_available` or `planning_context.session_plan`.
