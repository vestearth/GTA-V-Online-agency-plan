reference:
  id: tony-passive-income-reference
  purpose: Reference metadata and scoring hints for Tony's passive-income business analysis.
  canonical_runtime_file: ../data/tony.json
  owner_agent: tony

supported_business_types:
  nightclub_warehouse: # calculate active warehouse revenue and nightclub stock loop
    - nightclub
    - warehouse
  nightclub_passive: # recurring nightclub passive income stream
    - nightclub
  passive_businesses: # true passive income sources
    - arcade
    - agency
    - salvage_yard
    - bail_office
    - garment_factory
    - car_wash

scoring_hints:
  high_priority_goods:
    - south_american_imports
    - cargo_and_shipments
    - sporting_goods
  low_priority_goods:
    - printing_and_copying
    - organic_produce
  prioritize_feeder_repairs_below_supply_percent: 40
  prioritize_feeder_repairs_below_stock_percent: 35
  popularity_warning_below_percent: 60

passive_income_values:
  arcade: 5000
  agency:
    current: 12000
    max: 20000
  car_wash: 25000
  bail_office: 10000
  salvage_yard_range:
    min: 300
    max: 24000
  nightclub_passive_range:
    min: 20000
    max: 50000
  garment_factory_range:
    min: 1500
    max: 2000
runtime_contract:
  required_top_level:
    - goods
    - totals
  goods_required_fields:
    - id
    - name
    - value_per_crate
    - min_storage
    - max_storage
    - max_value
  normalized_goods_id_examples:
    - cargo_and_shipments
    - sporting_goods
    - south_american_imports

notes:
  - Keep machine-readable values in agents/data/tony.json only.
  - Use this file for thresholds, hints, and reference metadata rather than duplicating the goods catalog.