notes:
  - "Populate prices conservatively: no guessing."
  - "If a value cannot be verified quickly, keep it null and rely on qualitative evaluation."
  - "Some weekly names are typo/mismatch variants (see alias hints)."
  - "`vehicle_tier` is a planning hint tier (collector/utility/special/unrated), not raw lap-time ranking."
  - "`removed_vehicle` and `removed_vehicle_weeks` are inferred from weekly payload flags where present."
matching_rules:
  - "Try exact `vehicle_name` first."
  - "Then normalize punctuation/dashes (e.g., `V–STR` -> `V-STR`)."
  - "Then try manufacturer-stripped name by dropping first token (e.g., `Bravado Gauntlet Interceptor` -> `Gauntlet Interceptor`)."
  - "Then try `alias_hints`."

