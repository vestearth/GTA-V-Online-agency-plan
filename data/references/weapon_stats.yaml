  military_rifle:
    name: "Military Rifle"
    tier: "B"
    base_price: 397500
    utility: "Decent assault rifle, but outclassed by the Heavy Rifle or Special Carbine in most scenarios."
    gun_van_exclusive: false

  battle_rifle:
    name: "Battle Rifle"
    tier: "A"
    base_price: 450000
    utility: "High damage per shot, great accuracy. Solid choice for mid-range combat."
    gun_van_exclusive: true

combat_items:
  body_armor:
    tier: "S"
    utility: "Literal lifesaver. Never pass up a heavy discount."
  sticky_bomb:
    tier: "S"
    utility: "Best throwable in the game for drive-bys."
