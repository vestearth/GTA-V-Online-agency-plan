# GTA V Online Arsenal Reference Database
# Used by Trevor Philips for Combat Value Evaluation

weapons:
  railgun:
    name: "Railgun"
    tier: "S"
    base_price: 730000
    utility: "Anti-vehicle, one-shot explosive, essential for taking down helicopters and armored targets."
    gun_van_exclusive: true

  stun_gun:
    name: "Stun Gun"
    tier: "A"
    base_price: 375000
    utility: "Non-lethal trolling, disabling NPCs. Way too expensive normally, but a must-have if heavily discounted/free."
